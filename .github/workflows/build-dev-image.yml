name: build-dev-image

on:
  push:
    paths:
      - 'Dockerfile.dev'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  build:
    # Skip the whole job if the key files aren’t present
    if: ${{ hashFiles('Dockerfile.dev') != '' && hashFiles('package.json') != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push dev image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:dev
          echo "Building $IMAGE"
          docker build -t "$IMAGE" -f Dockerfile.dev .
          docker push "$IMAGE"
