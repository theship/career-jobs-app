# Daytona reads this automatically if it’s at repo root
image: ghcr.io/theship/career-jobs-app:dev   # built once by CI & cached
limits:
  cpu: 1
  memory: 2Gi
autoStopMinutes: 45
env:
  - GH_PAT=${GH_PAT}             # pulled from your shell when you run dev.sh
  - NODE_ENV=development
networkPolicy:
  egress:
    - allow: https://registry.npmjs.org
